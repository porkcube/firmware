; Seeed XIAO nRF52840 + XIAO Wio SX1262 DIY
[env:dmm-01_v1_0]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840
framework = arduino
; board = xiao_ble_sense
extends = nrf52840_base
board_level = extra
build_flags = ${nrf52840_base.build_flags}
    -Ivariants/nrf52840/diy/dmm-01
    -Isrc/platform/nrf52/softdevice
    -Isrc/platform/nrf52/softdevice/nrf52
    -D PRIVATE_HW
    -D V1_0
    ; -D WIO_LR1121
board_build.ldscript = src/platform/nrf52/nrf52840_s140_v7.ld
build_src_filter = ${nrf52_base.build_src_filter} +<../variants/nrf52840/diy/dmm-01>
debug_tool = jlink

